services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your .env file before deploying}
      - JWT_EXPIRES_IN=12h
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-Admin@123}
    volumes:
      - billing_data:/app/backend/data
    restart: unless-stopped

volumes:
  billing_data:
